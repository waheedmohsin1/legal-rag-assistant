<!DOCTYPE html>
<html>

<head>
    <title>Legal RAG Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 60%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        .msg {
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 80%;
            white-space: pre-wrap;
        }

        .user {
            background: #d1e7ff;
            margin-left: auto;
        }

        .bot {
            background: #e9ecef;
            margin-right: auto;
        }

        .input-box {
            display: flex;
            margin-top: 10px;
        }

        textarea {
            flex: 1;
            height: 60px;
            font-size: 14px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }

        .loading {
            font-style: italic;
            color: gray;
        }

        details {
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>⚖️ Legal RAG Assistant</h2>

        <div id="chat" class="chat-box"></div>

        <div class="input-box">
            <textarea id="question" placeholder="Ask something legal..."></textarea>
            <button onclick="askQuestion()">Send</button>
        </div>

    </div>

    <script>

        const chat = document.getElementById("chat");

        function addMessage(text, type) {

            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.innerText = text;
            chat.appendChild(div);

            chat.scrollTop = chat.scrollHeight;

            return div;
        }

        async function askQuestion() {

            const input = document.getElementById("question");
            const question = input.value.trim();

            if (!question) return;

            addMessage(question, "user");

            input.value = "";

            const loadingMsg = addMessage("Thinking...", "bot loading");

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });

            const data = await response.json();

            loadingMsg.remove();

            const botMsg = document.createElement("div");
            botMsg.className = "msg bot";

            botMsg.innerHTML = `
                <b>Answer:</b><br>
                ${data.answer}
                <br><br>

                <details>
                    <summary>📚 Citations</summary>
                    <pre>${JSON.stringify(data.citations, null, 2)}</pre>
                </details>
            `;

            chat.appendChild(botMsg);
            chat.scrollTop = chat.scrollHeight;
        }

    </script>

</body>

</html>
